<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e"/>
      <stop offset="100%" style="stop-color:#252526"/>
    </linearGradient>
    <!-- RdYlGn gradient for usage bands -->
    <linearGradient id="heatGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#06061a"/>
      <stop offset="20%"  style="stop-color:#0a2010"/>
      <stop offset="35%"  style="stop-color:#1a6035"/>
      <stop offset="50%"  style="stop-color:#a50026;stop-opacity:0.9"/>
      <stop offset="65%"  style="stop-color:#f46d43;stop-opacity:0.85"/>
      <stop offset="78%"  style="stop-color:#fdae61;stop-opacity:0.7"/>
      <stop offset="88%"  style="stop-color:#4ec9b0;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#06061a"/>
    </linearGradient>
    <!-- Earth globe gradient -->
    <radialGradient id="globeGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%"  style="stop-color:#1a4a6e;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#0e3a55;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#05101a;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="bgGlobe" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  style="stop-color:#1a3a20;stop-opacity:0.25"/>
      <stop offset="60%" style="stop-color:#0e2030;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1e1e1e;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle background globe -->
  <circle cx="600" cy="315" r="380" fill="url(#bgGlobe)" opacity="0.4"/>
  <circle cx="600" cy="315" r="378" fill="none" stroke="#2a3a2a" stroke-width="1" opacity="0.3"/>

